version: '3.8'

services:
  db:
    image: postgres:15
    container_name: science_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: science_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - 5432
    networks:
      - science_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d science_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: science_backend
    environment:
      DATABASE_URL: postgresql://postgres:your_password@db:5432/science_manager
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - science_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: science_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - science_net

volumes:
  postgres_data:
networks:
  science_net:
    driver: bridge
