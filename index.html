<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Manager | Khoa ATTT</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 28px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0ea5e9;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #0284c7;
        }

        .btn-secondary {
            background: transparent;
            color: #cbd5e1;
            border: 1px solid #475569;
        }

        .btn-secondary:hover {
            background: #334155;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🛡️ Khoa An Toàn Thông Tin</h1>
        <p>Frontend Mockup - Hệ thống Quản lý Hoạt động NCKH</p>
        <div class="buttons">
            <a href="http://localhost:8000/docs" target="_blank" class="btn btn-primary">🚀 Chạm vào Backend API Docs
                (Swagger)</a>
            <a href="http://localhost:8000/" target="_blank" class="btn btn-secondary">🌐 Ping FastAPI</a>
        </div>
    </div>
</body>

</html>
