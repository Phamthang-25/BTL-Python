<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - NCKH</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="center-content bg-light">
    <div class="card shadow" style="width: 350px;">
        <h2 style="text-align: center; margin-bottom: 20px;">Đăng nhập</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Tài khoản</label>
                <input type="text" id="username" class="form-control" required placeholder="admin / teacher1 / student1">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" class="form-control" required placeholder="123456">
            </div>
            <p id="errorMsg" style="color: red; display: none; text-align: center; font-size: 14px;"></p>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Truy cập</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 14px; color: #666;">
            (Chế độ thử nghiệm: Mật khẩu mặc định là admin123 hoặc 123456)
        </p>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
