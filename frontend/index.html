<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SciRes — Đăng nhập</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #login-screen {
      background: #f0f0f0;
      position: relative;
    }
    .login-box .subtitle { color: #777; font-size: 13px; margin-bottom: 24px; text-align: center; }
    .login-box .logo-icon { display: flex; justify-content: center; margin-bottom: 12px; }
    .login-box .logo-icon span { font-size: 48px; }
    .login-divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 16px; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
    .login-divider span { font-size: 12px; color: #999; white-space: nowrap; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    .demo-accounts { display: none; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <div class="logo-icon"><span>🔬</span></div>
      <h2>Đăng nhập</h2>
      <p class="subtitle">Hệ thống Quản lý Nghiên cứu Khoa học</p>
      <div id="login-msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Tài khoản</label>
          <input type="email" id="email" placeholder="email@university.edu.vn" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
          <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:#777; cursor:pointer">
            <input type="checkbox" style="width:auto; accent-color:var(--primary)"> Ghi nhớ
          </label>
          <a href="#" style="font-size:12px; color:var(--primary); text-decoration:none">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:11px; font-size:14px">Đăng nhập</button>
      </form>

      <div class="login-footer">
        © 2026 SciRes — PTIT Research Management
      </div>

      <div class="demo-accounts">
        <button onclick="fillLogin('admin@university.edu.vn')">Admin</button>
        <button onclick="fillLogin('staff@university.edu.vn')">Staff</button>
        <button onclick="fillLogin('leader@university.edu.vn')">Leader</button>
        <button onclick="fillLogin('faculty1@university.edu.vn')">Faculty</button>
        <button onclick="fillLogin('student1@university.edu.vn')">Student</button>
        <button onclick="fillLogin('reviewer1@university.edu.vn')">Reviewer</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (API.token()) location.href = '/app.html';

    function fillLogin(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = 'password123';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('login-msg');
      try {
        msg.innerHTML = '';
        const user = await API.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        location.href = '/app.html';
      } catch(err) {
        msg.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
